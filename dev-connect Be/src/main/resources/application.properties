# Application
spring.application.name=devconnect
server.port=8080

# Database Configuration
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-long-enough-for-hs256
# Token lifetime in ms. Set to ~10 years so users stay logged in (no periodic re-login).
jwt.expiration=315360000000

# Logging
logging.level.root=INFO
logging.level.com.devconnect=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload (if needed later)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
cors.allowed-origin-patterns=${FRONTEND_URL:*}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
# SockJS (/ws/info) sends credentialed XHRs, so the browser requires
# Access-Control-Allow-Credentials: true. CorsConfig uses setAllowedOriginPatterns,
# which echoes the specific request origin back (never a literal "*"), so enabling
# credentials is safe even when the pattern is "*".
cors.allow-credentials=true
cors.max-age=3600
