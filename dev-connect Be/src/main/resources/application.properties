# Application
spring.application.name=devconnect
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dev_conenct
spring.datasource.username=ticket
spring.datasource.password=Raya123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-long-enough-for-hs256
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.devconnect=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload (if needed later)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
