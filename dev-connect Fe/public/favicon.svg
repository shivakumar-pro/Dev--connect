<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241129"/>
      <stop offset="1" stop-color="#2e1410"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.45" stop-color="#fb923c"/>
      <stop offset="0.8" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded tile -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#f97316" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Inner fire glow -->
  <circle cx="32" cy="38" r="22" fill="url(#glow)"/>

  <!-- Flame tongues licking up behind the R -->
  <path d="M24 16 C 21 11, 26 8, 25 4 C 30 8, 30 14, 26 18 Z" fill="url(#fire)" opacity="0.9"/>
  <path d="M40 17 C 37 12, 42 9, 41 5 C 46 10, 45 16, 41 19 Z" fill="url(#fire)" opacity="0.75"/>
  <path d="M32 12 C 28 6, 35 2, 33 -2 C 41 4, 39 13, 34 16 Z" fill="url(#fire)"/>

  <!-- Letter R, filled with fire gradient -->
  <text x="32" y="49" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="42" font-weight="800" fill="url(#fire)">R</text>
</svg>
